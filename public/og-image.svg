  <path d="M 1100 60 L 1110 90 L 1120 80 M 1100 140 L 1090 110 L 1080 120 M 1140 100 L 1110 100 L 1120 90 M 1060 100 L 1090 100 L 1080 110"
        stroke="#C9A23E" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Decorative compass rose (bottom left) -->
  <circle cx="120" cy="530" r="50" fill="none" stroke="#C9A23E" stroke-width="2" opacity="0.3"/>

  <!-- Main text -->
  <text x="80" y="180" font-family="Marcellus, serif" font-size="72" font-weight="bold" fill="#F5EFDF">

<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14264E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E1A34;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="#C9A23E"/>

  <!-- Decorative compass rose (top right) -->

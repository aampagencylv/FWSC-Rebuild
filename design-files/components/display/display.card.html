<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:18px 24px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Card, Badge, Tag, Alert, Tabs, Dialog, Button } = window.FWSCDesignSystem_db6c3e;

function Demo() {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ display: 'grid', gap: 16 }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
        <Card eyebrow="Resource" title="Pre-rental briefing checklist">Required items for every livery rental.</Card>
        <Card variant="certificate" eyebrow="Program" title="Livery Safety Certification">Annual inspection and staff training.</Card>
        <Card variant="navy" eyebrow="Coalition" title="34 member liveries">Across 11 Florida counties.</Card>
      </div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
        <Badge tone="clear">Certified</Badge>
        <Badge tone="danger">Advisory in effect</Badge>
        <Badge tone="caution">Under review</Badge>
        <Badge tone="info">Notice</Badge>
        <Badge tone="gold">Founding member</Badge>
        <Badge>Neutral</Badge>
        <span style={{ width: 12 }}></span>
        <Tag>Tampa Bay</Tag>
        <Tag>Pontoon</Tag>
        <Tag onRemove={() => {}}>Jet ski</Tag>
      </div>
      <Alert tone="caution" title="Small craft advisory — Tampa Bay" action={<Button size="sm" variant="ghost">Details</Button>}>
        Winds 20–25 kt through 6 PM EDT. Restrict rentals to protected waters.
      </Alert>
      <Alert tone="danger" title="Boat ramp closed — Matanzas Inlet">Storm damage; use Bings Landing until further notice.</Alert>
      <Tabs tabs={['Advisories', 'Closures', 'Notices']} defaultValue="Advisories" />
      <div><Button variant="secondary" onClick={() => setOpen(true)}>Open dialog</Button></div>
      <Dialog open={open} onClose={() => setOpen(false)} eyebrow="Membership" title="Join the Coalition"
        actions={<React.Fragment><Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button><Button onClick={() => setOpen(false)}>Continue</Button></React.Fragment>}>
        Membership is open to registered Florida liveries and water-sport operators in good standing.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>

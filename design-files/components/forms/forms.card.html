<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);padding:18px 24px}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, RadioGroup, Switch } = window.FWSCDesignSystem_db6c3e;

function Demo() {
  const [region, setRegion] = React.useState('Pontoon');
  return (
    <div style={{ display: 'grid', gap: 18 }}>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
        <Button variant="primary">Find a certified operator</Button>
        <Button variant="accent">Report an incident</Button>
        <Button variant="secondary">View advisories</Button>
        <Button variant="ghost">Learn more</Button>
        <Button variant="danger">Revoke</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <Button size="sm" variant="secondary">Small</Button>
        <Button size="md" variant="secondary">Medium</Button>
        <Button size="lg" variant="secondary">Large</Button>
        <IconButton label="Search" variant="secondary"><span style={{ fontSize: 16 }}>⌕</span></IconButton>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 }}>
        <Input label="Vessel registration no." placeholder="FL-0000-XX" hint="As shown on your certificate" />
        <Input label="Email" error="Enter a valid email address" required defaultValue="captain@" />
        <Select label="Region" options={['Panhandle', 'Tampa Bay', 'Southeast', 'Florida Keys']} />
      </div>
      <div style={{ display: 'flex', gap: 28, alignItems: 'flex-start', flexWrap: 'wrap' }}>
        <div style={{ display: 'grid', gap: 8 }}>
          <Checkbox defaultChecked>Life jackets aboard</Checkbox>
          <Checkbox>Float plan filed</Checkbox>
          <Checkbox disabled>Disabled</Checkbox>
        </div>
        <RadioGroup name="vessel" value={region} onChange={setRegion} options={['Pontoon', 'Jet ski', 'Kayak']} />
        <div style={{ display: 'grid', gap: 8 }}>
          <Switch defaultChecked>Email advisories</Switch>
          <Switch>SMS alerts</Switch>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body></html>

<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.row{display:flex;gap:10px;padding:16px}
.sw{flex:1;height:118px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid rgba(14,26,52,.12)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.75}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--navy-900);color:#F5EFDF"><b>navy-900</b><span>#0E1A34</span></div>
<div class="sw" style="background:var(--navy-800);color:#F5EFDF"><b>navy-800</b><span>#14264E · primary</span></div>
<div class="sw" style="background:var(--navy-600);color:#F5EFDF"><b>navy-600</b><span>#2A4478</span></div>
<div class="sw" style="background:var(--gold-600);color:#fff"><b>gold-600</b><span>#B08A2E</span></div>
<div class="sw" style="background:var(--gold-500);color:#14264E"><b>gold-500</b><span>#C9A23E · primary</span></div>
<div class="sw" style="background:var(--gold-400);color:#14264E"><b>gold-400</b><span>#E3BE6A</span></div>
</div></body></html>

<!-- @dsCard group="Spacing" viewport="700x160" subtitle="4px base scale" name="Spacing tokens" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);padding:20px 28px;font-family:var(--font-sans)}
.row{display:flex;align-items:flex-end;gap:18px}
.s{display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{background:var(--navy-800);width:28px;border-radius:1px}
.s span{font-size:11px;color:var(--ink-600)}</style></head>
<body><div class="row">
<div class="s"><div class="bar" style="height:4px"></div><span>1·4</span></div>
<div class="s"><div class="bar" style="height:8px"></div><span>2·8</span></div>
<div class="s"><div class="bar" style="height:12px"></div><span>3·12</span></div>
<div class="s"><div class="bar" style="height:16px"></div><span>4·16</span></div>
<div class="s"><div class="bar" style="height:24px"></div><span>5·24</span></div>
<div class="s"><div class="bar" style="height:32px"></div><span>6·32</span></div>
<div class="s"><div class="bar" style="height:48px"></div><span>7·48</span></div>
<div class="s"><div class="bar" style="height:64px"></div><span>8·64</span></div>
<div class="s"><div class="bar" style="height:96px"></div><span>9·96</span></div>
</div></body></html>

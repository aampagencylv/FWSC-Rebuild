<!-- @dsCard group="Colors" viewport="700x150" subtitle="Marine advisory signaling — danger, caution, clear, info" name="Status" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.row{display:flex;gap:10px;padding:16px}
.cell{flex:1;border-radius:var(--radius-sm);height:118px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border-top-width:3px;border-top-style:solid;border:1px solid rgba(14,26,52,.1)}
.cell b{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}.cell span{font-size:11px;color:var(--ink-600)}</style></head>
<body><div class="row">
<div class="cell" style="background:var(--status-danger-bg);border-top:3px solid var(--status-danger)"><b style="color:var(--status-danger)">Danger</b><span>closures, incidents</span></div>
<div class="cell" style="background:var(--status-caution-bg);border-top:3px solid var(--status-caution)"><b style="color:var(--status-caution)">Caution</b><span>advisories</span></div>
<div class="cell" style="background:var(--status-clear-bg);border-top:3px solid var(--status-clear)"><b style="color:var(--status-clear)">Clear</b><span>certified, open</span></div>
<div class="cell" style="background:var(--status-info-bg);border-top:3px solid var(--status-info)"><b style="color:var(--status-info)">Notice</b><span>general notices</span></div>
</div></body></html>

<!-- @dsCard group="Colors" viewport="700x150" subtitle="Parchment surfaces and ink text scale" name="Neutrals" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.row{display:flex;gap:10px;padding:16px}
.sw{flex:1;height:118px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid rgba(14,26,52,.12)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.75}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--parchment-100);color:#1A2030"><b>parchment-100</b><span>page bg</span></div>
<div class="sw" style="background:var(--parchment-200);color:#1A2030"><b>parchment-200</b><span>raised</span></div>
<div class="sw" style="background:var(--white);color:#1A2030"><b>white</b><span>cards</span></div>
<div class="sw" style="background:var(--line-300);color:#1A2030"><b>line-300</b><span>hairline</span></div>
<div class="sw" style="background:var(--ink-400);color:#fff"><b>ink-400</b><span>disabled</span></div>
<div class="sw" style="background:var(--ink-600);color:#fff"><b>ink-600</b><span>muted</span></div>
<div class="sw" style="background:var(--ink-900);color:#fff"><b>ink-900</b><span>body text</span></div>
</div></body></html>

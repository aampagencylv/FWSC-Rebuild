<!-- @dsCard group="Colors" viewport="700x150" subtitle="Water, palm, brick — drawn from the seal interior; use sparingly" name="Seal accents" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-page)}
.row{display:flex;gap:10px;padding:16px}
.sw{flex:1;height:118px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid rgba(14,26,52,.12)}
.sw b{font-size:12px;font-weight:600}.sw span{font-size:11px;opacity:.75}</style></head>
<body><div class="row">
<div class="sw" style="background:var(--water-500);color:#fff"><b>water-500</b><span>#4E7FBE</span></div>
<div class="sw" style="background:var(--water-100);color:#1A2030"><b>water-100</b></div>
<div class="sw" style="background:var(--palm-600);color:#fff"><b>palm-600</b><span>#2E6B44</span></div>
<div class="sw" style="background:var(--palm-100);color:#1A2030"><b>palm-100</b></div>
<div class="sw" style="background:var(--brick-600);color:#fff"><b>brick-600</b><span>#8C3B2E</span></div>
<div class="sw" style="background:var(--brick-100);color:#1A2030"><b>brick-100</b></div>
</div></body></html>

<!-- @dsCard group="Brand" viewport="700x200" subtitle="The coalition seal — never redraw, min 48px" name="Seal" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);display:flex;height:200px}
.half{flex:1;display:flex;align-items:center;justify-content:center;gap:18px}</style></head>
<body>
<div class="half"><img src="../assets/fwsc-seal.png" alt="FWSC seal" style="width:120px;height:120px"><div style="font-size:12px;color:var(--ink-600);max-width:150px">On parchment or white. Clear space = ¼ seal width.</div></div>
<div class="half" style="background:var(--navy-800)"><img src="../assets/fwsc-seal.png" alt="FWSC seal on navy" style="width:120px;height:120px;border-radius:50%"><div style="font-size:12px;color:#C8D2E4;max-width:150px">On navy bands. Never below 48px; never redrawn.</div></div>
</body></html>
